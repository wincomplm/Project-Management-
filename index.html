<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sprint Workload Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&family=DM+Mono:wght@400;500&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f0f2f7;
  --surface:#ffffff;
  --surface2:#f8fafc;
  --border:#e2e8f0;
  --text:#1e293b;
  --muted:#64748b;
  --accent:#6366f1;
  --green:#10b981;
  --red:#ef4444;
  --orange:#f97316;
  --yellow:#f59e0b;
  --mono:'DM Mono',monospace;
  --sans:'DM Sans',system-ui,sans-serif;
}

body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;padding:0}

/* ── Shell ── */
.header{background:#0f172a;color:#fff;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-left .label{font-size:11px;font-weight:600;color:#64748b;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;font-family:var(--mono)}
.header-left .title{font-size:22px;font-weight:800;letter-spacing:-0.5px;cursor:text;display:inline-flex;align-items:center;gap:8px}
.header-left .title:hover .edit-icon{opacity:1}
.edit-icon{font-size:13px;color:#64748b;opacity:0;transition:opacity .2s}
.title-input{font-size:22px;font-weight:800;background:transparent;border:none;border-bottom:2px solid var(--accent);color:#fff;outline:none;font-family:var(--sans);letter-spacing:-0.5px;width:360px}
.kpi-row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.kpi{text-align:center}
.kpi-val{font-size:22px;font-weight:800;line-height:1}
.kpi-lbl{font-size:10px;color:#94a3b8;font-family:var(--mono);margin-top:2px}

/* ── Toolbar ── */
.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 32px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.view-toggle{display:flex;background:#f1f5f9;border-radius:8px;padding:2px;gap:2px}
.vbtn{padding:5px 14px;border-radius:6px;border:none;background:transparent;color:#64748b;font-weight:600;font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .15s}
.vbtn.active{background:#0f172a;color:#fff}
select,input[type=text]{padding:6px 10px;border-radius:8px;border:1px solid var(--border);font-size:12px;background:#fff;cursor:pointer;font-family:var(--sans);outline:none;color:var(--text)}
input[type=text]{width:180px}
.add-btn-toolbar{margin-left:auto;padding:6px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--sans)}

/* ── Main ── */
.main{padding:24px 32px}

/* ── Table view ── */
.table-wrap{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#f8fafc;border-bottom:2px solid var(--border)}
th{padding:10px 14px;text-align:left;font-weight:700;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;font-family:var(--mono)}
th.c{text-align:center}
td{padding:10px 14px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tbody tr{cursor:pointer;transition:background .12s}
tbody tr:hover{background:#f8fafc}
tbody tr.expanded{background:#f8fafc}
.exp-row td{padding:14px 24px 14px 48px;background:#f8fafc}
.exp-inner{display:flex;gap:32px;flex-wrap:wrap}
.exp-block strong{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;font-family:var(--mono)}
.exp-block p{font-size:13px;color:var(--text);line-height:1.5}

/* ── Board view ── */
.board{display:flex;gap:16px;overflow-x:auto;padding-bottom:16px}
.board-col{min-width:270px;flex:0 0 270px}
.board-col-header{font-weight:700;font-size:13px;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.board-col-header .dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.board-col-header .count{margin-left:auto;border-radius:99px;font-size:11px;padding:1px 8px;font-weight:800}
.board-cards{display:flex;flex-direction:column;gap:10px}
.board-card{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid var(--border);cursor:pointer;box-shadow:0 1px 3px #0001;transition:box-shadow .15s}
.board-card:hover{box-shadow:0 4px 12px #0002}
.card-section{font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;margin-bottom:4px;font-family:var(--mono)}
.card-title{font-weight:600;font-size:13px;color:var(--text);margin-bottom:4px;line-height:1.4}
.card-jira{font-size:11px;color:var(--accent);margin-bottom:4px;font-family:var(--mono)}
.card-customer{font-size:11px;color:#64748b;margin-bottom:8px}
.card-notes{margin-top:8px;font-size:11px;color:#64748b;background:#f8fafc;border-radius:6px;padding:6px 8px;line-height:1.4}

/* ── People view ── */
.people-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.person-card{background:#fff;border-radius:12px;border:1px solid var(--border);overflow:hidden;transition:border-color .2s}
.person-card.overloaded{border-color:#fca5a5}
.person-header{background:#f8fafc;padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.person-card.overloaded .person-header{background:#fef2f2}
.person-info{flex:1}
.person-name{font-weight:700;font-size:14px}
.person-sub{font-size:11px;color:#64748b;margin-top:2px}
.person-flags{display:flex;gap:6px;flex-wrap:wrap}
.flag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;font-family:var(--mono)}
.flag-heavy{background:#fee2e2;color:#ef4444}
.flag-blocked{background:#fff7ed;color:#f97316}
.person-stats{padding:10px 16px;display:flex;gap:16px;border-bottom:1px solid #f1f5f9;align-items:center}
.stat{text-align:center}
.stat-val{font-size:18px;font-weight:800;line-height:1}
.stat-lbl{font-size:10px;color:#94a3b8;font-family:var(--mono)}
.person-progress{margin-left:auto;min-width:100px}
.prog-track{height:8px;background:#f1f5f9;border-radius:99px;overflow:hidden;margin-bottom:4px}
.prog-fill{height:100%;border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.prog-lbl{font-size:10px;color:#94a3b8;text-align:right;font-family:var(--mono)}
.person-items{max-height:180px;overflow-y:auto}
.person-item{padding:8px 16px;border-bottom:1px solid #f8fafc;display:flex;align-items:center;gap:8px;font-size:12px}
.person-item:last-child{border-bottom:none}

/* ── Badges ── */
.status-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap;border:1px solid transparent}
.priority-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;flex-shrink:0}
.section-pill{font-size:11px;font-weight:600;padding:2px 7px;background:#f1f5f9;border-radius:6px;color:#64748b;white-space:nowrap}

/* ── Avatars ── */
.avatar{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;color:#fff;font-weight:700;flex-shrink:0;border:2px solid #fff}
.avatar-sm{width:26px;height:26px;font-size:10px}
.avatar-md{width:36px;height:36px;font-size:13px}
.avatars{display:flex;gap:3px;flex-wrap:wrap}

/* ── Action buttons ── */
.btn-edit{padding:3px 10px;font-size:11px;font-weight:600;background:#f1f5f9;border:none;border-radius:6px;cursor:pointer;color:#475569;margin-right:4px;font-family:var(--sans)}
.btn-del{padding:3px 10px;font-size:11px;font-weight:600;background:#fef2f2;border:none;border-radius:6px;cursor:pointer;color:#ef4444;font-family:var(--sans)}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:#0008;z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:16px;padding:28px;width:540px;max-width:95vw;max-height:85vh;overflow-y:auto}
.modal h3{margin:0 0 20px;font-size:16px;font-weight:800}
.form-group{margin-bottom:12px}
.form-group label{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px;font-family:var(--mono)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--sans);outline:none;color:var(--text)}
.form-group textarea{resize:vertical}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-cancel{padding:8px 18px;background:#f1f5f9;border:none;border-radius:8px;font-weight:600;cursor:pointer;font-family:var(--sans)}
.btn-save{padding:8px 18px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:var(--sans)}

/* ── Sprint progress bar ── */
.sprint-bar-wrap{display:flex;align-items:center;gap:10px;min-width:200px}
.sprint-bar-track{flex:1;height:10px;background:#1e293b;border-radius:99px;overflow:hidden}
.sprint-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#6366f1,#10b981);transition:width .4s cubic-bezier(.4,0,.2,1)}
.sprint-bar-pct{font-size:12px;font-weight:800;color:#10b981;min-width:36px;text-align:right;font-family:var(--mono)}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:99px}
</style>
</head>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="label">Sprint Tracker</div>
    <div id="titleDisplay" class="title" onclick="startEditTitle()">
      <span id="titleText">Week 11–12 · Mar 9–20, 2026</span>
      <span class="edit-icon">✎</span>
    </div>
    <input id="titleInput" class="title-input" style="display:none"
      onblur="commitTitle()" onkeydown="if(event.key==='Enter')commitTitle()"/>
  </div>
  <div class="kpi-row" id="kpiRow"></div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="view-toggle">
    <button class="vbtn active" id="btn-table"  onclick="setView('table')">≡ Table</button>
    <button class="vbtn"        id="btn-board"  onclick="setView('board')">⬛ Board</button>
    <button class="vbtn"        id="btn-people" onclick="setView('people')">👤 People</button>
  </div>
  <input type="text" id="searchBox" placeholder="Search…" oninput="render()" />
  <select id="filterSection" onchange="render()"><option value="">All Sections</option></select>
  <select id="filterOwner"   onchange="render()"><option value="">All Owners</option></select>
  <select id="filterStatus"  onchange="render()"><option value="">All Statuses</option></select>
  <button class="add-btn-toolbar" onclick="openAdd()">+ Add Item</button>
</div>

<!-- MAIN -->
<div class="main" id="mainContent"></div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" style="display:none" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modalTitle">Edit Item</h3>
    <div class="form-group"><label>Title</label><input id="fTitle" type="text"/></div>
    <div class="form-group"><label>Jira</label><input id="fJira" type="text"/></div>
    <div class="form-group"><label>Customer</label><input id="fCustomer" type="text"/></div>
    <div class="form-group"><label>Section</label>
      <select id="fSection">
        <option>Decisions</option><option>Delivery</option><option>Top Priorities</option>
        <option>Security & Platform</option><option>Work in Progress</option><option>Customer Testing</option>
      </select>
    </div>
    <div class="form-group"><label>Owners (comma separated)</label><input id="fOwners" type="text"/></div>
    <div class="form-group"><label>Status</label>
      <select id="fStatus">
        <option>In Progress</option><option>Customer Testing</option><option>Backlog</option>
        <option>Done</option><option>On Hold</option><option>Blocked</option>
        <option>PTC Review</option><option>QA Testing</option>
      </select>
    </div>
    <div class="form-group"><label>Priority</label>
      <select id="fPriority"><option>High</option><option>Medium</option><option>Low</option></select>
    </div>
    <div class="form-group"><label>Target Date</label><input id="fTarget" type="text"/></div>
    <div class="form-group"><label>Notes</label><textarea id="fNotes" rows="3"></textarea></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save"   onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

  {id:37,section:"Customer Testing",title:"Thin-kom WC Upgrade Q1",jira:"WCOMP-369",owners:["Andreu Alcala"],status:"Customer Testing",priority:"Medium",target:"",notes:"",customer:"Thin-kom"},
  {id:38,section:"Customer Testing",title:"Benteler WAT on Download — Watermark issue",jira:"WCOMS-502",owners:["Nassim Bouayad-Agha"],status:"Customer Testing",priority:"Medium",target:"Feb 13, 2026",notes:"Delivered by Hao Pan Feb 13, 2026.",customer:"Benteler"},
  {id:39,section:"Customer Testing",title:"Advantest — Expose Assembly REST API",jira:"WCOMP-311",owners:["Cristian Romero","Andreu Alcala"],status:"Customer Testing",priority:"Medium",target:"",notes:"",customer:"Advantest"},
  {id:40,section:"Customer Testing",title:"WC Plus B's — Repex & Doc Export Audit Report",jira:"REPEX-112",owners:["Jose Miguel Luna"],status:"PTC Review",priority:"High",target:"",notes:"Watermarking failure on consecutive sts. Mar 3 for Max. New Audit reports Feb 23.",customer:null},
  {id:41,section:"Customer Testing",title:"Tristar — Promo Request stuck in Workflow",jira:"WCOMS-481",owners:["Yang Hao Zhang"],status:"Customer Testing",priority:"Medium",target:"",notes:"Failed again — investigate root cause.",customer:"Tristar"},
];

let nextId = 100;
let currentView = 'table';
let expandedId = null;
let editingId = null;

// ── Helpers ───────────────────────────────────────────────────────────────────
const ini = n => n.split(" ").map(x=>x[0]).join("").slice(0,2).toUpperCase();
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

function statusBadge(s){
  const c = STATUS_CFG[s]||{color:"#475569",bg:"#F1F5F9"};
  return `<span class="status-badge" style="background:${c.bg};color:${c.color};border-color:${c.color}22">${esc(s)}</span>`;
}
function priDot(p){
  return `<span class="priority-dot" style="background:${PRI_COLOR[p]||'#94a3b8'}" title="${esc(p)}"></span>`;
}
function avatar(name,size='sm'){
  const c = COLOR_MAP[name]||'#6366f1';
  return `<span class="avatar avatar-${size}" style="background:${c}" title="${esc(name)}">${ini(name)}</span>`;
}
function avatarGroup(owners){
  return `<div class="avatars">${owners.map(o=>avatar(o,'sm')).join('')}</div>`;
}

// ── Filters ───────────────────────────────────────────────────────────────────
function getFiltered(){
  const search = document.getElementById('searchBox').value.toLowerCase();
  const sec    = document.getElementById('filterSection').value;
  const owner  = document.getElementById('filterOwner').value;
  const status = document.getElementById('filterStatus').value;
  return items.filter(i=>{
    if(sec    && i.section !== sec) return false;
    if(owner  && !i.owners.includes(owner)) return false;
    if(status && i.status  !== status) return false;
    if(search && !i.title.toLowerCase().includes(search)
              && !(i.customer||'').toLowerCase().includes(search)
              && !(i.jira||'').toLowerCase().includes(search)) return false;
    return true;
  });
}

// ── KPIs ──────────────────────────────────────────────────────────────────────
function renderKPIs(){
  const total   = items.length;
  const done    = items.filter(i=>i.status==='Done').length;
  const blocked = items.filter(i=>i.status==='Blocked').length;
  const pct     = total ? Math.round(done/total*100) : 0;
  const kpiColors = ["#6366f1","#10b981","#ef4444"];
  const kpis = [["Total",total,"#6366f1"],["Done",done,"#10b981"],["Blocked",blocked,"#ef4444"]];
  document.getElementById('kpiRow').innerHTML = `
    ${kpis.map(([l,v,c])=>`<div class="kpi"><div class="kpi-val" style="color:${c}">${v}</div><div class="kpi-lbl">${l}</div></div>`).join('')}
    <div class="sprint-bar-wrap">
      <div class="sprint-bar-track"><div class="sprint-bar-fill" style="width:${pct}%"></div></div>
      <span class="sprint-bar-pct">${pct}%</span>
    </div>`;
}

// ── Populate filter dropdowns ─────────────────────────────────────────────────
function populateFilters(){
  const sections = [...new Set(items.map(i=>i.section))];
  const statuses = [...new Set(items.map(i=>i.status))];
  const owners   = [...new Set(items.flatMap(i=>i.owners))].sort();
  const sel = (id, opts) => {
    const el = document.getElementById(id);
    const cur = el.value;
    el.innerHTML = `<option value="">All ${id.replace('filter','')}</option>`
      + opts.map(o=>`<option value="${esc(o)}" ${cur===o?'selected':''}>${esc(o)}</option>`).join('');
  };
  sel('filterSection', sections);
  sel('filterOwner',   owners);
  sel('filterStatus',  statuses);
}

// ── Views ─────────────────────────────────────────────────────────────────────
function renderTable(filtered){
  if(!filtered.length) return `<div style="text-align:center;padding:40px;color:#94a3b8">No items match filters.</div>`;
  let rows = filtered.map((item,idx)=>{
    const exp = expandedId===item.id;
    const expRow = exp ? `<tr class="exp-row"><td colspan="10">
      <div class="exp-inner">
        <div class="exp-block"><strong>Notes</strong><p>${esc(item.notes||'—')}</p></div>
        <div class="exp-block"><strong>Owners</strong><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
          ${item.owners.map(o=>`<span style="display:flex;align-items:center;gap:5px;font-size:12px;background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:3px 10px">${avatar(o,'sm')}${esc(o)}</span>`).join('')}
        </div></div>
      </div></td></tr>` : '';
    return `<tr class="${exp?'expanded':''}" onclick="toggleExpand(${item.id},event)">
      <td style="color:#94a3b8;font-weight:700;width:30px">${idx+1}</td>
      <td><span class="section-pill">${esc(item.section)}</span></td>
      <td style="max-width:280px">
        <div style="font-weight:600;color:#1e293b;margin-bottom:2px">${esc(item.title)}</div>
        ${item.jira?`<div style="font-size:11px;color:#6366f1;font-family:var(--mono)">${esc(item.jira)}</div>`:''}
      </td>
      <td style="font-size:12px;color:#64748b;white-space:nowrap">${esc(item.customer||'—')}</td>
      <td>${avatarGroup(item.owners)}</td>
      <td style="white-space:nowrap">${statusBadge(item.status)}</td>
      <td style="white-space:nowrap">${priDot(item.priority)}<span style="font-size:12px;color:#64748b">${esc(item.priority)}</span></td>
      <td style="font-size:12px;color:#64748b;white-space:nowrap">${esc(item.target||'—')}</td>
      <td style="max-width:200px;font-size:12px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.notes||'—')}</td>
      <td style="white-space:nowrap">
        <button class="btn-edit" onclick="openEdit(${item.id},event)">Edit</button>
        <button class="btn-del"  onclick="deleteItem(${item.id},event)">✕</button>
      </td>
    </tr>${expRow}`;
  }).join('');
  return `<div class="table-wrap"><table>
    <thead><tr>
      <th>#</th><th>Section</th><th>Title / Jira</th><th>Customer</th>
      <th>Owners</th><th>Status</th><th class="c">Priority</th>
      <th>Target</th><th>Notes</th><th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function renderBoard(filtered){
  const statuses = Object.keys(STATUS_CFG).filter(s=>filtered.some(i=>i.status===s));
  if(!statuses.length) return `<div style="text-align:center;padding:40px;color:#94a3b8">No items match filters.</div>`;
  return `<div class="board">${statuses.map(status=>{
    const cfg = STATUS_CFG[status];
    const cols = filtered.filter(i=>i.status===status);
    return `<div class="board-col">
      <div class="board-col-header" style="color:${cfg.color}">
        <span class="dot" style="background:${cfg.color}"></span>
        ${esc(status)}
        <span class="count" style="background:${cfg.bg};color:${cfg.color}">${cols.length}</span>
      </div>
      <div class="board-cards">${cols.map(item=>`
        <div class="board-card" onclick="toggleExpand(${item.id},event)">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span class="card-section">${esc(item.section)}</span>
            ${priDot(item.priority)}
          </div>
          <div class="card-title">${esc(item.title)}</div>
          ${item.jira?`<div class="card-jira">${esc(item.jira)}</div>`:''}
          ${item.customer?`<div class="card-customer">📦 ${esc(item.customer)}</div>`:''}
          <div>${avatarGroup(item.owners)}</div>
          ${expandedId===item.id&&item.notes?`<div class="card-notes">${esc(item.notes)}</div>`:''}
        </div>`).join('')}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderPeople(){
  const workload = {};
  TEAM.forEach(t=>{workload[t]={total:0,high:0,blocked:0,done:0,items:[]};});
  items.forEach(item=>{
    item.owners.forEach(o=>{
      if(!workload[o]) workload[o]={total:0,high:0,blocked:0,done:0,items:[]};
      workload[o].total++;
      workload[o].items.push(item);
      if(item.priority==='High') workload[o].high++;
      if(item.status==='Blocked') workload[o].blocked++;
      if(item.status==='Done') workload[o].done++;
    });
  });
  const people = TEAM.filter(t=>workload[t].total>0);
  return `<div class="people-grid">${people.map(person=>{
    const w = workload[person];
    const pct = w.total ? Math.round(w.done/w.total*100) : 0;
    const overloaded = w.total>=6;
    const color = COLOR_MAP[person]||'#6366f1';
    return `<div class="person-card ${overloaded?'overloaded':''}">
      <div class="person-header">
        ${avatar(person,'md')}
        <div class="person-info">
          <div class="person-name">${esc(person)}</div>
          <div class="person-sub">${w.total} task${w.total!==1?'s':''} · ${w.total-w.done} remaining</div>
        </div>
        <div class="person-flags">
          ${overloaded?'<span class="flag flag-heavy">⚠ Heavy</span>':''}
          ${w.blocked?'<span class="flag flag-blocked">🔴 Blocked</span>':''}
        </div>
      </div>
      <div class="person-stats">
        ${[["High",w.high,"#ef4444"],["Done",w.done,"#10b981"],["Blocked",w.blocked,"#f97316"]].map(([l,v,c])=>
          `<div class="stat"><div class="stat-val" style="color:${c}">${v}</div><div class="stat-lbl">${l}</div></div>`).join('')}
        <div class="person-progress">
          <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
          <div class="prog-lbl">${pct}% done</div>
        </div>
      </div>
      <div class="person-items">${w.items.map(item=>`
        <div class="person-item">
          ${priDot(item.priority)}
          <span style="flex:1;line-height:1.3">${esc(item.title)}</span>
          ${statusBadge(item.status)}
        </div>`).join('')}
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  const filtered = getFiltered();
  let html = '';
  if(currentView==='table')  html = renderTable(filtered);
  if(currentView==='board')  html = renderBoard(filtered);
  if(currentView==='people') html = renderPeople();
  document.getElementById('mainContent').innerHTML = html;
  renderKPIs();
  populateFilters();
}

// ── Interactions ──────────────────────────────────────────────────────────────
function setView(v){
  currentView = v;
  ['table','board','people'].forEach(x=>{
    document.getElementById('btn-'+x).classList.toggle('active',x===v);
  });
  render();
}

function toggleExpand(id, e){
  e.stopPropagation();
  expandedId = expandedId===id ? null : id;
  render();
}

function deleteItem(id, e){
  e.stopPropagation();
  items = items.filter(i=>i.id!==id);
  if(expandedId===id) expandedId=null;
  render();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function fillModal(item){
  document.getElementById('fTitle').value    = item.title||'';
  document.getElementById('fJira').value     = item.jira||'';
  document.getElementById('fCustomer').value = item.customer||'';
  document.getElementById('fSection').value  = item.section||'Top Priorities';
  document.getElementById('fOwners').value   = (item.owners||[]).join(', ');
  document.getElementById('fStatus').value   = item.status||'In Progress';
  document.getElementById('fPriority').value = item.priority||'Medium';
  document.getElementById('fTarget').value   = item.target||'';
  document.getElementById('fNotes').value    = item.notes||'';
}

function openEdit(id, e){
  e.stopPropagation();
  editingId = id;
  const item = items.find(i=>i.id===id);
  document.getElementById('modalTitle').textContent = 'Edit Item';
  fillModal(item);
  document.getElementById('modalBg').style.display='flex';
}

function openAdd(){
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add New Item';
  fillModal({title:'',jira:'',customer:'',section:'Top Priorities',owners:[],status:'In Progress',priority:'Medium',target:'',notes:''});
  document.getElementById('modalBg').style.display='flex';
}

function closeModal(e){
  if(e && e.target!==document.getElementById('modalBg')) return;
  document.getElementById('modalBg').style.display='none';
}

function saveItem(){
  const data = {
    title:    document.getElementById('fTitle').value.trim(),
    jira:     document.getElementById('fJira').value.trim(),
    customer: document.getElementById('fCustomer').value.trim()||null,
    section:  document.getElementById('fSection').value,
    owners:   document.getElementById('fOwners').value.split(',').map(s=>s.trim()).filter(Boolean),
    status:   document.getElementById('fStatus').value,
    priority: document.getElementById('fPriority').value,
    target:   document.getElementById('fTarget').value.trim(),
    notes:    document.getElementById('fNotes').value.trim(),
  };
  if(!data.title) return;
  if(editingId){
    items = items.map(i=>i.id===editingId ? {...i,...data} : i);
  } else {
    items.push({id:nextId++, ...data});
  }
  document.getElementById('modalBg').style.display='none';
  render();
}

// ── Title edit ────────────────────────────────────────────────────────────────
function startEditTitle(){
  document.getElementById('titleInput').value = document.getElementById('titleText').textContent;
  document.getElementById('titleDisplay').style.display='none';
  document.getElementById('titleInput').style.display='inline-block';
  document.getElementById('titleInput').focus();
}
function commitTitle(){
  const v = document.getElementById('titleInput').value||'Sprint';
  document.getElementById('titleText').textContent = v;
  document.getElementById('titleInput').style.display='none';
  document.getElementById('titleDisplay').style.display='inline-flex';
}

// ── Init ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
